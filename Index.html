<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paletas</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🎨 Generador de Paletas</h1>
        <p>Generá combinaciones de colores aleatorias para tus proyectos.</p>
    </header>

    <main>

        <section>
            <h2>Configuración</h2>

            <div class="config-controles">
              <label for="tamano-paleta">Tamaño de la paleta:</label>
              <select id="tamano-paleta">
                <option value="6">6 colores</option>
                <option value="8">8 colores</option>
                <option value="9">9 colores</option>
              </select>
              <button id="btn-generar">Generar paleta</button>
            </div>
        </section>

        <section>
            <h2>Paleta Generada</h2>

            <div id="contenedor-paleta">
        <!-- Las tarjetas de colores se generan acá con JavaScript --> </div>
        </section>

    </main>

    <footer>
        <p>Proyecto Integrador Full Stack - Matías De Luca</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
